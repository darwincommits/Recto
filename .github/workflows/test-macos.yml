# Recto pytest on macOS — GitHub-hosted runner.
#
# Public repo (Apache 2.0), so we use GitHub-hosted macos-latest
# instead of a self-hosted runner. Self-hosted runners on PUBLIC repos
# are a documented attack vector: any fork can submit a PR with a
# malicious workflow that executes on your runner. Hosted macOS
# runners are ephemeral (clean VM per job), free for public repos,
# and unlock the same ~17 macOS-specific tests we wanted (Unix-socket
# sign-helper, Linux/macOS Job-Object stub, "Windows only" reverse-
# gates on CredMan + DPAPI, SO_REUSEADDR semantics on adminui)
# because the runner IS actually macOS.
#
# Self-hosted on MAC stays in the picture for iOS device deploy
# (Apple Developer Program ceremony + xcrun devicectl install to
# real iPhone hardware) — that's MAC-local manual work, not CI.
# See docs/MAC-SETUP.md Part B.

name: Test on macOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: pytest on macOS (GitHub-hosted)
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Recto with all extras the test suite needs
        # `dev` brings pytest + coverage tooling.
        # `v0_4` brings cryptography + pyjwt[crypto] which the
        #         bootloader-sessions / enclave_stub / sign_helper
        #         tests need (Ed25519 + JWT EdDSA verify path).
        # `ethereum` and `bitcoin` are empty marker extras (no new
        #         packages) so we don't install them — the modules
        #         load by import unconditionally.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,v0_4]"

      - name: Show environment
        run: |
          echo "Runner: $(uname -a)"
          echo "Python: $(python --version)"
          echo "pwd: $(pwd)"
          python -m pytest --version

      - name: Make short TMPDIR for AF_UNIX tests
        # macOS caps AF_UNIX socket paths at 104 chars (vs 108 on
        # Linux), and pytest's default tmp_path resolves to
        # /var/folders/zz/.../pytest-of-runner/pytest-N/... which
        # blows past that — sign_helper tests fail with "OSError:
        # AF_UNIX path too long". Setting TMPDIR to a short prefix
        # keeps the paths short. /tmp/r is plenty short and writable
        # on every macOS runner. Created here once so subsequent
        # pytest steps just inherit the env var.
        run: mkdir -p /tmp/r

      - name: Run full pytest suite
        env:
          TMPDIR: /tmp/r
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Surface skip count
        # Prints the count of skipped tests so CI logs make it
        # obvious how many platform-gates we're still running into.
        # On macOS this should be lower than Windows (the macOS-
        # applicable gates we just unlocked were ~17 of the ~18
        # Windows skips).
        if: always()
        env:
          TMPDIR: /tmp/r
        run: |
          python -m pytest tests/ -q 2>&1 | grep -E "passed|skipped|failed" | tail -3
