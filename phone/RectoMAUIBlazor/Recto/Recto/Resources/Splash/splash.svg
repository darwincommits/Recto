<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <!-- Recto wordmark splash. Renders the literal "RECTO" in the system's
         default sans-serif (Segoe UI on Windows, San Francisco on macOS,
         Roboto on Android). MAUI's per-platform resize pipeline rasterizes
         this at build time via SkiaSharp; sans-serif resolves to whatever
         the build host provides.
         The earlier path-based version had a layout bug (C and O paths
         straddled their neighbors, painting over the T and reading as
         "RECO"); SVG text avoids the geometry trap entirely. White text
         on whatever the splash Color is set to (currently #1E1B4B in
         Recto.csproj). -->
    <text x="228" y="248"
          text-anchor="middle"
          font-family="sans-serif"
          font-size="84"
          font-weight="700"
          letter-spacing="8"
          fill="#ffffff">RECTO</text>
</svg>
